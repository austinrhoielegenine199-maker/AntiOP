name: Build AntiOP

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build
        run: gradle build

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: AntiOP
          path: build/libs/*.jar
